<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid p-3">

<div class="d-flex justify-content-between align-items-center mb-3">
<h4 class="fw-bold">Project Dashboard</h4>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal">
+ Add Project
</button>
</div>

<div class="row mb-3">
<div class="col-md-6">
<input type="text" id="searchInput" class="form-control" placeholder="Search project...">
</div>

<div class="col-md-3">
<select id="statusFilter" class="form-select">
<option value="all">All</option>
<option value="Completed">Completed</option>
<option value="In Progress">In Progress</option>
</select>
</div>
</div>

<div class="table-box">
<table class="table align-middle">
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div id="pagination" class="text-center"></div>

</div>

<div class="modal fade" id="projectModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Add Project</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="text" id="name" class="form-control mb-2" placeholder="Project Name">
<input type="text" id="details" class="form-control mb-2" placeholder="Details">

<select id="department" class="form-select mb-2">
<option>Development</option>
<option>DevOps</option>
<option>AI</option>
<option>Frontend</option>
<option>Backend</option>
</select>

<select id="priority" class="form-select mb-2">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<input type="date" id="startDate" class="form-control mb-2">
<input type="date" id="endDate" class="form-control mb-2">

<select id="status" class="form-select">
<option>Completed</option>
<option>In Progress</option>
</select>

</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<button class="btn btn-success" onclick="addProject()">Save</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
