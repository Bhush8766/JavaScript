    <section>
        <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(223, 223, 223); height: 300px;">
            <h2>Assignment 1 . To Do List Manager</h2>
            <br>
            <div class="container">
                <input type="text" id="inputAssgn1" />
                <button class="btn btn-primary" onclick="addToDos()">Add Task</button>
                <button class="btn btn-primary" onclick="clearAllToDo()">Clear All</button>
            </div>
            <div class="container" id="resultToDo"></div>
        </div>
    </section>

    <script>
        toDos = []

        function renderToDos() {
            document.querySelector('#resultToDo').innerHTML = toDos.map((task, index) => `
                                    <div class='mb-1'>
                                        <b class='text-primary pe-5'>${task}</b>
                                        <button class='btn btn-danger'onclick='deleteTask(${index})'>DELETE</button>
                                    </div>
    `).join('')
        }


        function addToDos() {
            inputToDoElmt = document.querySelector('#inputAssgn1')
            newToDo = inputToDoElmt.value
            toDos.push(newToDo)
            // console.log(toDos)
            renderToDos()
            console.log(inputToDoElmt.value)
            inputToDoElmt.value = ''
            console.log(inputToDoElmt.value)

        }

        function clearAllToDo() {
            console.log(toDos)
            toDos = []
            renderToDos()
            console.log(toDos)
        }

        function deleteTask(i) {
            console.log(i)
            toDos.splice(i, 1)
            renderToDos()
        }

    </script>




    <!----------------------------section 2------------------------------------>


    <section>
        <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(223, 223, 223); height: 300px;">

            <h2>2. Student Marks Calculator</h2>
            <div class="container">
                <input type="number" id="markInput" placeholder="Enter mark">
                <button class="btn btn-primary" onclick="addMark()">Add Marks</button>
                <button class="btn btn-primary" onclick="calculate()">Calculate</button>
                <button class="btn btn-primary" onclick="reset()">Reset</button>
            </div>

            <div class="result" id="resultBox">

                <p>Total Marks: 0</p>
                <p>Average Marks: 0</p>
                <p>Highest Mark: 0</p>
                <p>Lowest Mark: 0</p>

            </div>
        </div>
    </section>

    <script>
        let marks = []

        function addMark() {
            let input = document.getElementById("markInput")
            let value = Number(input.value)

            console.log(value)
            if (value === "" || isNaN(value)) {
                alert('Enter valid marks')
                return;
            } else {
                marks.push(value);
                input.value = " ";
            }
        }



        function calculate() {

            if (marks.length === 0) {
                alert("No marks added");
                return;
            }

            let total = 0;

            for (let i = 0; i < marks.length; i++) {
                total += marks[i];
            }

            let average = total / marks.length;

            let highest = Math.max(...marks);
            let lowest = Math.min(...marks);

            document.getElementById("resultBox").innerHTML = `
<p>Total Marks: ${total}</p>
<p>Average Marks: ${average.toFixed(2)}</p>
<p>Highest Mark: ${highest}</p>
<p>Lowest Mark: ${lowest}</p>
`;

        }



        function resetMarks() {

marks = [];

document.getElementById("markInput").value = "";

document.getElementById("resultBox").innerHTML = `
<p>Total Marks: 0</p>
<p>Average Marks: 0</p>
<p>Highest Mark: 0</p>
<p>Lowest Mark: 0</p>
`;

}



    </script>
