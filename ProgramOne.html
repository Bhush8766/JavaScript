<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <p id="ParaDemo"></p>
    <h2 id="heading"></h2>
    <button onclick="clickMeToShow()">Click Me</button>


    <p>Addition : <span id="add"></span></p>
    <p>Subtraction : <span id="sub"></span></p>
    <p>Multiplication : <span id="mul"></span></p>
    <p>Division : <span id="div"></span></p>


    <input type="text" id="UserName">
    <button onclick="getUser()">Get User Name</button>
    <div id="greet"></div>


    <script>
        document.getElementById("ParaDemo").innerHTML = "Hello this is paragraph."
        document.querySelector("#heading").textContent = "This is heading."
    </script>

    <script>
        function clickMeToShow() {
            document.write("Hello, This info is Display after click on button. ")
        }
    </script>


    <script>
        n1 = prompt("Enter Number One")
        n2 = prompt("Enter Number Two")
        document.getElementById('add').textContent = Number(n1)+Number(n2)
        document.getElementById('sub').textContent = Number(n1)-Number(n2)
        document.getElementById('mul').textContent = Number(n1)*Number(n2)
        document.getElementById('div').textContent = Number(n1)/Number(n2)
    </script>

    <script>
        function getUser() {
            userN = document.getElementById("UserName").value
            document.querySelector("#greet").innerHTML = "Welcome, "+userN
        }

    </script>

    <script src="./ProgramOne.js"></script>
    
</body>
</html>
